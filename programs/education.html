<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Free Education — Dogar Welfare Trust</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="header-inner">
        <a href="../index.html" class="brand brand--link">
          <span class="brand-mark" aria-hidden="true">◇</span>
          <div class="brand-text">
            <span class="brand-title" data-i18n="brandTitle">Dogar Welfare Trust</span>
            <span class="brand-tagline" data-i18n="brandTagline">Serving communities with compassion</span>
          </div>
        </a>
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" class="lang-btn is-active" data-lang="en" aria-pressed="true">English</button>
          <button type="button" class="lang-btn" data-lang="ur" aria-pressed="false">اردو</button>
        </div>
      </div>
    </header>

    <main id="main-content" class="program-detail">
      <section class="hero hero--compact">
        <div class="hero-inner">
          <p><a href="../index.html" class="back-link" data-i18n="backHome">← Back to home</a></p>
          <h1 class="hero-title" data-i18n="educationTitle">Free Education</h1>
          <p class="hero-ngo" data-i18n="heroNgoLine">A registered non-profit organisation (NGO).</p>
          <p class="page-intro" data-i18n="detailEducationLead"></p>
        </div>
      </section>

      <section class="section">
        <div class="section-inner">
          <div class="carousel" data-carousel>
            <div class="carousel-viewport">
              <div class="carousel-track">
                <figure class="carousel-slide">
                  <div class="carousel-visual carousel-visual--edu1" aria-hidden="true"></div>
                  <figcaption data-i18n="educationSlide1"></figcaption>
                </figure>
                <figure class="carousel-slide">
                  <div class="carousel-visual carousel-visual--edu2" aria-hidden="true"></div>
                  <figcaption data-i18n="educationSlide2"></figcaption>
                </figure>
                <figure class="carousel-slide">
                  <div class="carousel-visual carousel-visual--edu3" aria-hidden="true"></div>
                  <figcaption data-i18n="educationSlide3"></figcaption>
                </figure>
                <figure class="carousel-slide">
                  <div class="carousel-visual carousel-visual--edu4" aria-hidden="true"></div>
                  <figcaption data-i18n="educationSlide4"></figcaption>
                </figure>
                <figure class="carousel-slide">
                  <div class="carousel-visual carousel-visual--edu5" aria-hidden="true"></div>
                  <figcaption data-i18n="educationSlide5"></figcaption>

                </figure>
                <figure class="carousel-slide">
                  <div class="carousel-visual carousel-visual--edu7" aria-hidden="true"></div>
                  <figcaption data-i18n="educationSlide7"></figcaption>
                </figure>
                <figure class="carousel-slide">
                  <div class="carousel-visual carousel-visual--edu8" aria-hidden="true"></div>
                  <figcaption data-i18n="educationSlide8"></figcaption>
                </figure>
                <figure class="carousel-slide">
                  <div class="carousel-visual carousel-visual--edu9" aria-hidden="true"></div>
                  <figcaption data-i18n="educationSlide9"></figcaption>
                </figure>
                <figure class="carousel-slide">
                  <div class="carousel-visual carousel-visual--edu10" aria-hidden="true"></div>
                  <figcaption data-i18n="educationSlide10"></figcaption>
                </figure>
              </div>
            </div>
            <div class="carousel-controls">
              <button type="button" class="carousel-btn carousel-prev" aria-label="Previous slide">‹</button>
              <div class="carousel-dots" role="tablist" aria-label="Slides">
                <button type="button" class="carousel-dot is-active" role="tab" aria-selected="true" aria-label="Slide 1"></button>
                <button type="button" class="carousel-dot" role="tab" aria-selected="false" aria-label="Slide 2"></button>
                <button type="button" class="carousel-dot" role="tab" aria-selected="false" aria-label="Slide 3"></button>

                <button type="button" class="carousel-dot" role="tab" aria-selected="false" aria-label="Slide 7"></button>

          <div class="program-body program-body--detail">

            <p class="program-text" data-i18n="educationMissionBody"></p>
            <h2 class="program-subtitle" data-i18n="educationContactTitle">Contact</h2>
            <p class="program-text" data-i18n="educationContactBody"></p>
            <p class="program-text program-contact-line">
              <span data-i18n="contactEmailLabel">Email</span><span class="contact-colon">: </span><a href="mailto:javediqbaldogarwt@gmail.com">javediqbaldogarwt@gmail.com</a>
            </p>
            <div class="donate-card">
              <h2 class="program-subtitle" data-i18n="educationDonateTitle">Donate</h2>
              <p class="program-text" data-i18n="educationDonateBody"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-text" data-i18n="footerNote"></p>
      </div>
